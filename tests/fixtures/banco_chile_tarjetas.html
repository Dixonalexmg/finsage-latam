<!DOCTYPE html>
<html lang="es-CL">
  <head>
    <meta charset="utf-8" />
    <title>Tarjetas de Crédito — Banco de Chile</title>
  </head>
  <body>
    <main>
      <h1>Tarjetas de Crédito</h1>

      <article class="tarjeta"
               data-product="credit-card"
               data-slug="visa-classic"
               data-name="Visa Classic Banco de Chile"
               data-tier="classic"
               data-currency="CLP"
               data-min-income="450000"
               data-annual-fee="35000"
               data-tea="0.38"
               data-limit-min="300000"
               data-limit-max="3000000"
               data-rewards="false"
               data-international="true">
        <h2>Visa Classic</h2>
        <p>Tarjeta para clientes que inician su historial crediticio.</p>
      </article>

      <article class="tarjeta"
               data-product="credit-card"
               data-slug="visa-gold"
               data-name="Visa Gold Banco de Chile"
               data-tier="gold"
               data-currency="CLP"
               data-min-income="900000"
               data-annual-fee="75000"
               data-tea="0.33"
               data-limit-min="800000"
               data-limit-max="7000000"
               data-rewards="true"
               data-cashback="0.015"
               data-international="true">
        <h2>Visa Gold</h2>
        <p>Acumula Dólares Premio en todas tus compras.</p>
      </article>

      <article class="tarjeta"
               data-product="credit-card"
               data-slug="mastercard-signature"
               data-name="Mastercard Signature Banco de Chile"
               data-tier="signature"
               data-currency="CLP"
               data-min-income="2500000"
               data-annual-fee="180000"
               data-tea="0.29"
               data-limit-min="3000000"
               data-limit-max="25000000"
               data-rewards="true"
               data-cashback="0.03"
               data-international="true">
        <h2>Mastercard Signature</h2>
        <p>Beneficios en viajes y salas VIP LATAM Pass.</p>
      </article>

      <section class="promociones">
        <p>Consulta condiciones en cada tarjeta.</p>
      </section>
    </main>
  </body>
</html>
